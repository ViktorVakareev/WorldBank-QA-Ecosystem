name: E2E Quality Gate

# 🚀 1. TRIGGERS: Run on Pull Requests to main, or manually via a button
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch: 

jobs:
  # 🪟 JOB 1: Execute the tests on your local Windows machine (Handles your local Docker ReportPortal)
  playwright-tests:
    timeout-minutes: 15 
    runs-on: self-hosted

    env:
      # 🛡️ THE HOOK: This triggers the headless & memory-safe logic we wrote in AiTriage.cs
      CI: true 

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🏗️ Build Framework
        # 🛡️ ARCHITECTURAL OVERRIDE: Forces the runner to use the 64-bit SDK regardless of host PATH
        run: |
          $env:PATH = "C:\Program Files\dotnet;" + $env:PATH
          dotnet build src/Automation.Framework/ --configuration Release

      - name: 🌐 Install Playwright Browsers & OS Dependencies
        run: pwsh src/Automation.Framework/bin/Release/net9.0/playwright.ps1 install --with-deps

      - name: 🧹 Purge Zombie Processes
        shell: pwsh
        run: |
          Write-Host "Cleaning up orphaned Playwright and .NET host processes..."
          Get-Process -Name chrome, node, ffmpeg, testhost -ErrorAction SilentlyContinue | Stop-Process -Force
          Write-Host "Cleanup complete."

      - name: 🧪 Execute UI Test Suite
        timeout-minutes: 10 
        env:
          ReportPortal_Server_Authentication_Uuid: ${{ secrets.RP_API_KEY }}
          ReportPortal_TraceLevel: Verbose
          # 🎯 THE FIX: Maps perfectly to _config["AiTriage:Enabled"]
          AiTriage__Enabled: true 
        run: dotnet test src/Automation.Framework/ --configuration Release --logger:"trx;LogFileName=TestResults.trx" --results-directory ./TestResults -- NUnit.NumberOfTestWorkers=1
        
      - name: 📤 Archive Raw Allure Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: raw-allure-results
          # 🎯 FORCE FLATTENING: Use the exact explicit path so files aren't buried in subfolders
          path: src/Automation.Framework/bin/Release/net9.0/allure-results/
          retention-days: 3

      - name: 🕒 Set Current Date
        if: always()
        shell: pwsh
        # Grabs the date in YYYY-MM-DD format and injects it into GitHub's environment variables
        run: echo "CURRENT_DATE=$(Get-Date -Format 'yyyy-MM-dd')" >> $env:GITHUB_ENV

      - name: 📊 Upload Test Results & Traces
        if: always()
        uses: actions/upload-artifact@v4
        with:
          # 🎯 DYNAMIC NAMING: Injects the build number AND the date from the previous step!
          name: test-results-and-traces-Run${{ github.run_number }}
          path: |
            **/TestResults/**/*.trx
            **/TestResults/**/*.zip
            **/TestResults/**/*.md
            **/TestResults/**/*.png
            **/TestResults/**/*.webm
            **/TestResults/**/*.playlist
          retention-days: 7

  # 🐧 JOB 2: Process and host the report on GitHub's Linux Cloud (Bypasses the Container Action error)
  generate-report:
    runs-on: ubuntu-latest
    needs: playwright-tests # 🚀 Grid Lock: Forces this job to wait until the test execution finishes
    if: always() # Guarantees the report is generated and hosted even if tests fail

    # 🔐 THE FIX: Grants the GITHUB_TOKEN write access to push the compiled site to your gh-pages branch
    permissions:
      contents: write

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 📥 Download Raw Allure Results
        uses: actions/download-artifact@v4
        with:
          name: raw-allure-results
          # 🎯 MUST MATCH: This folder name must perfectly match the allure_results input below
          path: allure-results-input

      - name: 📊 Generate Allure Report HTML
        # This Docker-based action executes safely now because it is running on native Linux
        uses: simple-elf/allure-report-action@master
        id: allure-report
        with:
          allure_results: allure-results-input
          gh_pages: gh-pages
          allure_report: allure-report
          allure_history: allure-history
          keep_reports: 20

      - name: 🚀 Deploy Allure Report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-history